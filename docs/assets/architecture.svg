<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" fill="none">
  <rect width="960" height="420" rx="16" fill="#0B0D11"/>
  <text x="480" y="36" text-anchor="middle" fill="#3AD0DE" font-family="ui-monospace, monospace" font-size="14" letter-spacing="3">RAILMIND  ONE ENGINE, TWO FACES</text>

  <!-- Data -->
  <rect x="24" y="64" width="140" height="56" rx="10" fill="#14171F" stroke="#242A35"/>
  <text x="94" y="88" text-anchor="middle" fill="#99A1AD" font-size="10" letter-spacing="1">DATA</text>
  <text x="94" y="106" text-anchor="middle" fill="#E7EAF0" font-size="11">GeoJSON + timetable</text>

  <!-- Engine box -->
  <rect x="200" y="56" width="560" height="200" rx="14" fill="#14171F" stroke="#3AD0DE" stroke-opacity="0.35"/>
  <text x="480" y="82" text-anchor="middle" fill="#3AD0DE" font-size="11" letter-spacing="2">PYTHON ENGINE (FastAPI + WebSocket)</text>

  <!-- Pipeline -->
  <g font-family="ui-monospace, monospace" font-size="10" fill="#E7EAF0">
    <rect x="220" y="96" width="88" height="32" rx="6" fill="#1A1E27" stroke="#242A35"/><text x="264" y="116" text-anchor="middle">Twin tick</text>
    <rect x="318" y="96" width="88" height="32" rx="6" fill="#1A1E27" stroke="#242A35"/><text x="362" y="116" text-anchor="middle">Detect</text>
    <rect x="416" y="96" width="88" height="32" rx="6" fill="#1A1E27" stroke="#242A35"/><text x="460" y="116" text-anchor="middle">Delay ML</text>
    <rect x="514" y="96" width="88" height="32" rx="6" fill="#1A1E27" stroke="#242A35"/><text x="558" y="116" text-anchor="middle">Cascade</text>
    <rect x="612" y="96" width="88" height="32" rx="6" fill="#1A1E27" stroke="#242A35"/><text x="656" y="116" text-anchor="middle">OR-Tools</text>
    <rect x="710" y="96" width="88" height="32" rx="6" fill="#1A1E27" stroke="#242A35"/><text x="754" y="116" text-anchor="middle">Verify</text>

    <path d="M308 112 H318 M406 112 H416 M504 112 H514 M602 112 H612 M700 112 H710" stroke="#3AD0DE" stroke-opacity="0.5"/>

    <text x="480" y="152" text-anchor="middle" fill="#99A1AD" font-size="10">8 AI modules · BrainTracker · Incident Timeline · Orchestrator</text>

    <!-- Modules grid -->
    <rect x="220" y="164" width="100" height="28" rx="5" fill="#37D99A" fill-opacity="0.12" stroke="#37D99A" stroke-opacity="0.4"/><text x="270" y="182" text-anchor="middle" fill="#37D99A">Conflict</text>
    <rect x="330" y="164" width="100" height="28" rx="5" fill="#3AD0DE" fill-opacity="0.12" stroke="#3AD0DE" stroke-opacity="0.4"/><text x="380" y="182" text-anchor="middle" fill="#3AD0DE">Delay ML</text>
    <rect x="440" y="164" width="100" height="28" rx="5" fill="#F5B027" fill-opacity="0.12" stroke="#F5B027" stroke-opacity="0.4"/><text x="490" y="182" text-anchor="middle" fill="#F5B027">OR-Tools</text>
    <rect x="550" y="164" width="100" height="28" rx="5" fill="#37D99A" fill-opacity="0.12" stroke="#37D99A" stroke-opacity="0.4"/><text x="600" y="182" text-anchor="middle" fill="#37D99A">Verifier</text>
    <rect x="660" y="164" width="100" height="28" rx="5" fill="#3AD0DE" fill-opacity="0.12" stroke="#3AD0DE" stroke-opacity="0.4"/><text x="710" y="182" text-anchor="middle" fill="#3AD0DE">NL Agent</text>
    <rect x="220" y="200" width="100" height="28" rx="5" fill="#99A1AD" fill-opacity="0.12" stroke="#99A1AD" stroke-opacity="0.4"/><text x="270" y="218" text-anchor="middle" fill="#99A1AD">Passenger</text>
    <rect x="330" y="200" width="100" height="28" rx="5" fill="#99A1AD" fill-opacity="0.12" stroke="#99A1AD" stroke-opacity="0.4"/><text x="380" y="218" text-anchor="middle" fill="#99A1AD">Anomaly</text>
    <rect x="440" y="200" width="100" height="28" rx="5" fill="#99A1AD" fill-opacity="0.12" stroke="#99A1AD" stroke-opacity="0.4"/><text x="490" y="218" text-anchor="middle" fill="#99A1AD">Explainer</text>
    <rect x="550" y="200" width="100" height="28" rx="5" fill="#99A1AD" fill-opacity="0.12" stroke="#99A1AD" stroke-opacity="0.4"/><text x="600" y="218" text-anchor="middle" fill="#99A1AD">Cascade</text>
  </g>

  <!-- Transport -->
  <rect x="780" y="120" width="156" height="72" rx="10" fill="#14171F" stroke="#242A35"/>
  <text x="858" y="148" text-anchor="middle" fill="#99A1AD" font-size="10">TRANSPORT</text>
  <text x="858" y="168" text-anchor="middle" fill="#E7EAF0" font-size="11">WS TwinSnapshot</text>
  <text x="858" y="184" text-anchor="middle" fill="#99A1AD" font-size="10">REST / what-if / apply</text>

  <!-- UI -->
  <rect x="200" y="280" width="736" height="112" rx="14" fill="#14171F" stroke="#242A35"/>
  <text x="568" y="306" text-anchor="middle" fill="#3AD0DE" font-size="11" letter-spacing="2">NEXT.JS CONTROL ROOM</text>
  <text x="568" y="332" text-anchor="middle" fill="#E7EAF0" font-size="11">Live map · Tracker · AI panel · Incident Timeline · Demo Mode · What-if + NL</text>
  <text x="568" y="354" text-anchor="middle" fill="#99A1AD" font-size="10">deck.gl · MapLibre · Zustand · typed contract.ts Ä Pydantic models.py</text>
  <text x="568" y="376" text-anchor="middle" fill="#99A1AD" font-size="10">LOCAL fallback sim when backend offline  same UI contract</text>

  <!-- Arrows -->
  <path d="M164 92 H200 M760 156 H780 M480 256 V280" stroke="#3AD0DE" stroke-opacity="0.6" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3AD0DE" fill-opacity="0.8"/>
    </marker>
  </defs>
</svg>
