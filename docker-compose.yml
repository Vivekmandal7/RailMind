# One command to bring up the whole system, connected:
#   docker compose up --build
# Then open http://localhost:3000
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # set OPENAI_API_KEY here to enable the optional LLM what-if phrasing
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # the browser connects directly to the engine, so this is the host URL
      - NEXT_PUBLIC_BACKEND_URL=http://127.0.0.1:8000
    depends_on:
      - backend
