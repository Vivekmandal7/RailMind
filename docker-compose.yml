# One command to bring up the whole system, connected:
#   docker compose up --build
# Then open http://localhost:3000
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Pass via a local .env file at repo root (gitignored) — never commit real keys
      - RAILMIND_CONFIG=${RAILMIND_CONFIG:-config/india_wide.yaml}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - RAILMIND_RAPIDAPI_KEY=${RAILMIND_RAPIDAPI_KEY:-}
      - RAILMIND_RAPIDAPI_HOST=${RAILMIND_RAPIDAPI_HOST:-indian-railway-irctc.p.rapidapi.com}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # the browser connects directly to the engine, so this is the host URL
      - NEXT_PUBLIC_BACKEND_URL=http://127.0.0.1:8000
      - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN:-}
    depends_on:
      - backend
